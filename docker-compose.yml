version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: scavo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scavo_exchange
    ports:
      - "5432:5432"
    volumes:
      - scavo_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: scavo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  scavo_pg_data: